{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "bun": {
        "pkg-path": "bun"
      },
      "gum": {
        "pkg-path": "gum"
      },
      "nodejs_20": {
        "pkg-path": "nodejs_20",
        "outputs": "all"
      },
      "postgresql": {
        "pkg-path": "postgresql",
        "outputs": "all"
      },
      "redis": {
        "pkg-path": "redis"
      }
    },
    "hook": {
      "on-activate": "set -euo pipefail\n\n# ── Load project environment variables ─────────────────────────────────────\nif [ -f \"$FLOX_ENV_PROJECT/.env\" ]; then\n  set -a\n  # shellcheck disable=SC1091\n  source \"$FLOX_ENV_PROJECT/.env\"\n  set +a\nelse\n  echo \"⚠ No .env file found. Copy .env.example to .env and fill in the values.\"\nfi\n\n# ── Flox-managed data paths (use $FLOX_ENV_CACHE, not stored in .env) ──────\nexport PGDATA=\"$FLOX_ENV_CACHE/postgres/data\"\nexport PGHOST=\"/tmp/platform-postgres\"\nexport REDIS_DATA_DIR=\"$FLOX_ENV_CACHE/redis/data\"\n\nmkdir -p \"$PGDATA\" \"$PGHOST\" \"$REDIS_DATA_DIR\"\n\nif [ ! -f \"$PGDATA/PG_VERSION\" ]; then\n  echo \"🔧 Initializing PostgreSQL…\"\n\n  initdb -D \"$PGDATA\" \\\n    --username=\"$PGUSER\" \\\n    --auth=trust \\\n    --no-locale \\\n    --encoding=UTF8 >/dev/null\n\n  cat >> \"$PGDATA/postgresql.conf\" <<EOF\nlisten_addresses = 'localhost'\nunix_socket_directories = '$PGHOST'\nport = $PGPORT\nEOF\n\n  pg_ctl -D \"$PGDATA\" -o \"-k $PGHOST -p $PGPORT\" -w start >/dev/null\n  createdb -U \"$PGUSER\" -h \"$PGHOST\" \"$PGDATABASE\" >/dev/null 2>&1 || true\n  pg_ctl -D \"$PGDATA\" -w stop >/dev/null\nfi\n\nexport DATABASE_URL=\"postgresql://$PGUSER@localhost:$PGPORT/$PGDATABASE\"\nexport REDIS_URL=\"${REDIS_URL:-redis://localhost:$REDIS_PORT}\"\n"
    },
    "profile": {
      "common": "echo \"\"\ngum style --bold \"Finance Tracker — Local Development Environment\"\necho \"\"\n\n# ── First-run hint ──────────────────────────────\ngum style --faint \"  Requires Ubuntu or WSL Ubuntu  •  https://flox.dev/docs/install-flox/\"\ngum style --faint \"  Design: https://www.figma.com/design/DhPCiphvnSKwBA5Zlrogai/Finance-Tracker/\"\ngum style --faint \"  Setup guide: README.md\"\necho \"\"\n\n# ── PostgreSQL status ───────────────────────────\nif pg_isready -q -h \"$PGHOST\" -p \"$PGPORT\" >/dev/null 2>&1; then\n  pg_status=\"● running\"\n  pg_color=\"--foreground 2\"\nelse\n  pg_status=\"● stopped\"\n  pg_color=\"--foreground 1\"\nfi\n\n# ── Redis status ────────────────────────────────\nif redis-cli -p \"$REDIS_PORT\" ping >/dev/null 2>&1; then\n  redis_status=\"● running\"\n  redis_color=\"--foreground 2\"\nelse\n  redis_status=\"● stopped\"\n  redis_color=\"--foreground 1\"\nfi\n\nprintf \"  %-14s\" \"PostgreSQL\"\ngum style $pg_color \"$pg_status\"\nprintf \"  %-14s\" \"Redis\"\ngum style $redis_color \"$redis_status\"\n\necho \"\"\n\ngum style --bold \"Environment\"\nprintf \"  %-14s %s\\n\" \"DATABASE_URL\" \"${DATABASE_URL:-<not set>}\"\nprintf \"  %-14s %s\\n\" \"REDIS_URL\"    \"${REDIS_URL:-<not set>}\"\n\necho \"\"\n\ngum style --bold \"Data\"\necho \"  $FLOX_ENV_CACHE/postgres\"\necho \"  $FLOX_ENV_CACHE/redis\"\n\necho \"\"\n\ngum style --bold \"Services\"\necho \"  start    flox services start\"\necho \"  status   flox services status\"\necho \"  stop     flox services stop\"\necho \"  restart  flox services restart\"\n\necho \"\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    },
    "services": {
      "postgres": {
        "command": "postgres -D \"$PGDATA\" -k \"$PGHOST\" -p \"$PGPORT\""
      },
      "redis": {
        "command": "redis-server --port \"$REDIS_PORT\" --dir \"$REDIS_DATA_DIR\" --daemonize no"
      }
    }
  },
